<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agent-viz</title>
<style>
/* ─── Holographic Palette ─── */
:root {
  --void: #050510;
  --void-light: #0a0e1a;
  --holo: #66ccff;
  --holo-bright: #aaeeff;
  --holo-dim: rgba(102, 204, 255, 0.5);
  --holo-muted: rgba(102, 204, 255, 0.15);
  --agent: #bc8cff;
  --agent-dim: rgba(188, 140, 255, 0.5);
  --tool: #ffbb44;
  --tool-dim: rgba(255, 187, 68, 0.4);
  --complete: #66ffaa;
  --complete-dim: rgba(102, 255, 170, 0.4);
  --error: #ff5566;
  --error-dim: rgba(255, 85, 102, 0.4);
  --skill: #56d6e2;
  --notification: #ffaa33;
  --glass-bg: rgba(10, 15, 30, 0.75);
  --glass-border: rgba(102, 204, 255, 0.12);
  --glass-hover: rgba(102, 204, 255, 0.08);
  --text-primary: #d0e8f8;
  --text-dim: rgba(102, 204, 255, 0.6);
  --text-muted: rgba(102, 204, 255, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--void);
  color: var(--text-primary);
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

/* ─── Main layout ─── */
#app { display: grid; grid-template-rows: 48px 1fr; height: 100vh; }

/* ─── Top bar ─── */
#topbar {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
  z-index: 100;
}
.logo {
  font-weight: 700; font-size: 14px; color: var(--holo);
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 24px; height: 24px; border-radius: 6px;
  background: linear-gradient(135deg, rgba(102,204,255,0.2), rgba(188,140,255,0.2));
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.sep { width: 1px; height: 24px; background: var(--glass-border); }

#connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--error); transition: all 0.3s;
}
#connection-dot.connected {
  background: var(--complete);
  box-shadow: 0 0 8px var(--complete-dim), 0 0 20px rgba(102,255,170,0.15);
}

.stat-group { display: flex; gap: 8px; margin-left: 8px; }
.stat {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-dim);
  padding: 4px 10px; border-radius: 20px;
  background: rgba(102, 204, 255, 0.04);
  border: 1px solid transparent;
  transition: all 0.2s;
}
.stat:hover { border-color: var(--glass-border); background: var(--glass-hover); }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-val { font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.stat-val.has-errors { color: var(--error); }
.stat-val.has-running { color: var(--notification); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
#search-box {
  background: rgba(102, 204, 255, 0.04);
  border: 1px solid var(--glass-border); border-radius: 8px;
  padding: 6px 12px; color: var(--text-primary); font-family: inherit; font-size: 12px;
  width: 200px; outline: none; transition: all 0.2s;
}
#search-box:focus { border-color: var(--holo); background: rgba(102, 204, 255, 0.08); box-shadow: 0 0 12px rgba(102,204,255,0.1); }
#search-box::placeholder { color: var(--text-muted); }

/* ─── Canvas area ─── */
#main { position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

/* ─── Floating panels ─── */
.glass-panel {
  position: absolute;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  overflow: hidden;
  z-index: 50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(102,204,255,0.05);
}

/* ─── Activity feed (right side) ─── */
#feed {
  top: 12px; right: 12px; width: 340px; bottom: 12px;
  display: flex; flex-direction: column;
}
#feed-header {
  padding: 12px 16px; border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: space-between;
}
#feed-title { font-size: 12px; font-weight: 600; color: var(--holo-bright); letter-spacing: 0.5px; text-transform: uppercase; }
#feed-count { font-size: 11px; color: var(--text-muted); }
#feed-list {
  flex: 1; overflow-y: auto; padding: 6px;
  scrollbar-width: thin; scrollbar-color: rgba(102,204,255,0.15) transparent;
}
#feed-list::-webkit-scrollbar { width: 4px; }
#feed-list::-webkit-scrollbar-track { background: transparent; }
#feed-list::-webkit-scrollbar-thumb { background: rgba(102,204,255,0.15); border-radius: 2px; }

.feed-item {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 2px;
  cursor: pointer; transition: all 0.15s;
  display: grid; grid-template-columns: 20px 1fr auto; gap: 10px; align-items: center;
  border: 1px solid transparent;
}
.feed-item:hover { background: var(--glass-hover); border-color: var(--glass-border); }
.feed-item.active { background: rgba(102,204,255,0.08); border-color: rgba(102,204,255,0.2); }
.feed-item.running .feed-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

.feed-dot {
  width: 8px; height: 8px; border-radius: 50%;
  justify-self: center;
}
.feed-info { overflow: hidden; min-width: 0; }
.feed-label { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-sub { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.feed-dur { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }

/* ─── Detail popup ─── */
#detail-popup {
  display: none; top: 12px; right: 364px; width: 380px; max-height: calc(100vh - 84px);
}
#detail-popup.visible { display: flex; flex-direction: column; animation: slide-in 0.2s ease-out; }
#detail-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; line-height: 1;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: all 0.15s;
}
#detail-close:hover { background: var(--glass-hover); color: var(--text-primary); }
#detail-head {
  padding: 16px; border-bottom: 1px solid var(--glass-border);
}
#detail-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
#detail-name { font-size: 16px; font-weight: 600; }
#detail-meta-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 12px 16px; border-bottom: 1px solid var(--glass-border);
}
.meta-card {
  background: rgba(102, 204, 255, 0.03); border-radius: 8px; padding: 8px 10px;
  border: 1px solid rgba(102, 204, 255, 0.06);
}
.meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
.meta-value { font-size: 13px; font-weight: 500; }
#detail-json-wrap { flex: 1; overflow-y: auto; padding: 12px 16px; }
#detail-json {
  font-size: 11px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
  color: var(--text-dim); font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  background: rgba(5, 5, 16, 0.5); border: 1px solid var(--glass-border);
  border-radius: 8px; padding: 12px; max-height: 400px; overflow-y: auto;
}

/* ─── Toolbar ─── */
#toolbar {
  position: absolute; bottom: 16px; left: 16px;
  display: flex; gap: 6px; z-index: 50;
}
#toolbar button {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  color: var(--text-primary); padding: 8px 14px;
  border-radius: 8px; cursor: pointer; font-size: 12px;
  font-family: inherit; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
#toolbar button:hover {
  background: var(--glass-hover); border-color: rgba(102,204,255,0.25);
  box-shadow: 0 0 12px rgba(102,204,255,0.08);
}
#toolbar button .shortcut {
  font-size: 10px; color: var(--text-muted);
  background: rgba(102,204,255,0.06); border-radius: 3px;
  padding: 1px 4px;
}

/* ─── Sessions overlay ─── */
#sessions-overlay {
  display: none; position: absolute; bottom: 60px; left: 16px;
  width: 320px; max-height: 400px; z-index: 60;
}
#sessions-overlay.visible { display: flex; flex-direction: column; animation: slide-up 0.2s ease-out; }
#sessions-title { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); font-size: 12px; font-weight: 600; color: var(--holo-bright); letter-spacing: 0.5px; text-transform: uppercase; }
#sessions-list { flex: 1; overflow-y: auto; padding: 6px; max-height: 340px; }
.session-card {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; margin-bottom: 2px;
  border: 1px solid transparent;
}
.session-card:hover { background: var(--glass-hover); border-color: var(--glass-border); }
.session-card.active { background: rgba(102,204,255,0.08); border-color: rgba(102,204,255,0.2); }
.session-card .s-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-card .s-prompt { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.session-card .s-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 12px; }

/* ─── Animations ─── */
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)} }
@keyframes slide-in { from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)} }
@keyframes slide-up { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }

/* ─── Scrollbar global ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(102,204,255,0.12); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">&#x25C8;</div>
      agent-viz
    </div>
    <span class="sep"></span>
    <div id="connection-dot" title="Disconnected"></div>
    <div class="stat-group">
      <div class="stat"><span class="stat-dot" style="background:var(--tool)"></span><span id="stat-tools" class="stat-val">0</span> tools</div>
      <div class="stat"><span class="stat-dot" style="background:var(--agent)"></span><span id="stat-agents" class="stat-val">0</span> agents</div>
      <div class="stat"><span class="stat-dot" style="background:var(--notification)"></span><span id="stat-running" class="stat-val">0</span> active</div>
      <div class="stat"><span class="stat-dot" style="background:var(--error)"></span><span id="stat-errors" class="stat-val">0</span> errors</div>
    </div>
    <div class="topbar-right">
      <input id="search-box" type="text" placeholder="Filter... (/)">
    </div>
  </div>

  <div id="main">
    <canvas id="canvas"></canvas>

    <!-- Activity Feed -->
    <div id="feed" class="glass-panel">
      <div id="feed-header">
        <span id="feed-title">Activity</span>
        <span id="feed-count"></span>
      </div>
      <div id="feed-list"></div>
    </div>

    <!-- Detail popup -->
    <div id="detail-popup" class="glass-panel">
      <button id="detail-close">&times;</button>
      <div id="detail-head">
        <div id="detail-type"></div>
        <div id="detail-name"></div>
      </div>
      <div id="detail-meta-grid"></div>
      <div id="detail-json-wrap">
        <pre id="detail-json"></pre>
      </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button onclick="toggleSessions()">Sessions <span class="shortcut">S</span></button>
      <button onclick="fitView()">Fit <span class="shortcut">F</span></button>
      <button onclick="resetEvents()">Clear <span class="shortcut">C</span></button>
      <button onclick="toggleAutoFit()">Auto-fit: <span id="autofit-label">ON</span></button>
    </div>

    <!-- Sessions overlay -->
    <div id="sessions-overlay" class="glass-panel">
      <div id="sessions-title">Sessions</div>
      <div id="sessions-list"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const COLORS = {
  void: '#050510',
  grid: 'rgba(102, 204, 255, 0.03)',
  session: '#66ccff', agent: '#bc8cff', tool: '#ffbb44',
  skill: '#56d6e2', error: '#ff5566', notification: '#ffaa33',
  complete: '#66ffaa', stop: '#8b949e',
  edge: 'rgba(102, 204, 255, 0.15)', edgeActive: 'rgba(102, 204, 255, 0.4)',
  particle: '#66ccff',
};

const AGENT_R = 36;          // Agent circle radius
const SESSION_R = 44;        // Session circle radius
const TOOL_W = 130, TOOL_H = 28; // Tool card size
const SPAWN_DIST = 220;      // Distance between agents and session
const LERP_SPEED = 5;        // Position lerp multiplier

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const state = {
  events: [], offset: 0, nodes: new Map(), selected: null,
  toolsCompleted: 0, filter: '', autoFit: true,
  timelineEntries: [], startTimes: new Map(),
  _lastServerId: null,
};

// Visual state for canvas animation
const vis = {
  nodes: new Map(), // id -> { x, y, targetX, targetY, opacity, scale, ... }
  particles: [],
  camera: { x: 0, y: 0, zoom: 1, targetX: 0, targetY: 0, targetZoom: 1 },
  time: 0,
  hoveredNode: null,
};

// ═══════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const main = document.getElementById('main');
  W = main.clientWidth; H = main.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════
// CAMERA (Pan & Zoom)
// ═══════════════════════════════════════════════
let dragging = false, dragStartX = 0, dragStartY = 0, camStartX = 0, camStartY = 0;

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const wc = screenToWorld(mx, my);
  vis.camera.targetZoom = Math.max(0.1, Math.min(5, vis.camera.targetZoom * r));
  // Adjust camera so world point stays under mouse
  vis.camera.targetX = mx / vis.camera.targetZoom - wc.x;
  vis.camera.targetY = my / vis.camera.targetZoom - wc.y;
}, { passive: false });

canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  // Check if clicking a node
  const wc = screenToWorld(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
  const hit = hitTest(wc.x, wc.y);
  if (hit) {
    state.selected = hit.id;
    showDetail(state.nodes.get(hit.id));
    renderFeed();
    return;
  }
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  camStartX = vis.camera.targetX; camStartY = vis.camera.targetY;
  canvas.style.cursor = 'grabbing';
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (dragging) {
    const dx = (e.clientX - dragStartX) / vis.camera.zoom;
    const dy = (e.clientY - dragStartY) / vis.camera.zoom;
    vis.camera.targetX = camStartX + dx;
    vis.camera.targetY = camStartY + dy;
  } else {
    const rect = canvas.getBoundingClientRect();
    const wc = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const hit = hitTest(wc.x, wc.y);
    vis.hoveredNode = hit ? hit.id : null;
    canvas.style.cursor = hit ? 'pointer' : 'grab';
  }
});

canvas.addEventListener('pointerup', () => {
  dragging = false;
  canvas.style.cursor = 'grab';
});

function screenToWorld(sx, sy) {
  return { x: sx / vis.camera.zoom - vis.camera.x, y: sy / vis.camera.zoom - vis.camera.y };
}

function worldToScreen(wx, wy) {
  return { x: (wx + vis.camera.x) * vis.camera.zoom, y: (wy + vis.camera.y) * vis.camera.zoom };
}

function hitTest(wx, wy) {
  // Reverse order to hit top-most first
  const entries = [...vis.nodes.entries()].reverse();
  for (const [id, vn] of entries) {
    const n = state.nodes.get(id);
    if (!n) continue;
    if (n.type === 'session' || n.type === 'agent') {
      const r = n.type === 'session' ? SESSION_R : AGENT_R;
      const dist = Math.hypot(wx - vn.x, wy - vn.y);
      if (dist <= r * vn.scale) return { id };
    } else {
      const hw = TOOL_W / 2, hh = TOOL_H / 2;
      if (wx >= vn.x - hw && wx <= vn.x + hw && wy >= vn.y - hh && wy <= vn.y + hh) return { id };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════
// NODE MANAGEMENT
// ═══════════════════════════════════════════════
function getNode(id) {
  if (!state.nodes.has(id)) {
    state.nodes.set(id, {
      id, type: 'tool', label: '', sub: '', color: COLORS.tool,
      children: [], parentId: null, data: null, status: 'running',
      x: 0, y: 0, duration: null, startTime: null, endTime: null,
    });
  }
  return state.nodes.get(id);
}

function ensureVisNode(id) {
  if (!vis.nodes.has(id)) {
    const n = state.nodes.get(id);
    const parent = n && n.parentId ? vis.nodes.get(n.parentId) : null;
    const startX = parent ? parent.x : 0;
    const startY = parent ? parent.y : 0;
    vis.nodes.set(id, {
      x: startX, y: startY,
      targetX: 0, targetY: 0,
      opacity: 0, targetOpacity: 1,
      scale: 0.3, targetScale: 1,
      glowPhase: Math.random() * Math.PI * 2,
    });
  }
  return vis.nodes.get(id);
}

function addTimelineEntry(evt, nodeId, type, label, sub) {
  state.timelineEntries.push({
    ts: evt._ts || new Date().toISOString(),
    nodeId, type, label, sub: sub || '',
  });
}

function processEvent(evt) {
  const sid = evt.session_id || 'unknown';
  const e = evt.hook_event_name;
  const ts = evt._ts || new Date().toISOString();

  if (e === 'SessionStart') {
    const n = getNode(`s:${sid}`);
    n.type = 'session'; n.label = 'Session'; n.sub = sid.slice(0, 8);
    n.color = COLORS.session; n.data = evt; n.status = 'running'; n.startTime = ts;
    addTimelineEntry(evt, n.id, 'session', 'Session', sid.slice(0, 8));
  }
  else if (e === 'SubagentStart') {
    const aid = evt.agent_id || sid;
    const n = getNode(`a:${aid}`);
    n.type = 'agent';
    n.label = evt.agent_type || evt.subagent_type || 'Agent';
    n.sub = (evt.tool_input && evt.tool_input.description) || aid.slice(0, 8);
    n.color = COLORS.agent; n.data = evt; n.status = 'running'; n.startTime = ts;
    const parent = getNode(`s:${sid}`);
    parent.type = 'session'; parent.label = parent.label || 'Session'; parent.color = COLORS.session;
    if (!n.parentId) { n.parentId = parent.id; parent.children.push(n); }
    addTimelineEntry(evt, n.id, 'agent', n.label, n.sub);
  }
  else if (e === 'SubagentStop') {
    const aid = evt.agent_id || sid;
    const n = state.nodes.get(`a:${aid}`);
    if (n) { n.status = 'done'; n.data = evt; n.endTime = ts; n.duration = calcDuration(n.startTime, ts); n.color = COLORS.complete; }
  }
  else if (e === 'PreToolUse') {
    const tid = evt.tool_use_id || `t${state.events.length}`;
    const n = getNode(`t:${tid}`);
    const isSkill = evt.tool_name === 'Skill';
    n.type = isSkill ? 'skill' : 'tool';
    n.label = isSkill ? ((evt.tool_input && evt.tool_input.skill) || 'Skill') : (evt.tool_name || 'Tool');
    n.sub = formatToolSub(evt);
    n.color = isSkill ? COLORS.skill : COLORS.tool;
    n.data = evt; n.status = 'running'; n.startTime = ts;
    state.startTimes.set(tid, ts);
    const parentId = evt.agent_id ? `a:${evt.agent_id}` : `s:${sid}`;
    const parent = getNode(parentId);
    if (parentId.startsWith('s:')) { parent.type = 'session'; parent.label = parent.label || 'Session'; parent.color = COLORS.session; }
    if (!n.parentId) { n.parentId = parent.id; parent.children.push(n); }
    addTimelineEntry(evt, n.id, n.type, n.label, n.sub);
  }
  else if (e === 'PostToolUse') {
    const tid = evt.tool_use_id || '';
    const n = state.nodes.get(`t:${tid}`);
    if (n) { n.status = 'done'; n.data = evt; n.endTime = ts; n.duration = calcDuration(n.startTime, ts); state.toolsCompleted++; }
  }
  else if (e === 'PostToolUseFailure') {
    const tid = evt.tool_use_id || '';
    const n = state.nodes.get(`t:${tid}`);
    if (n) { n.status = 'error'; n.color = COLORS.error; n.data = evt; n.endTime = ts; n.duration = calcDuration(n.startTime, ts); }
  }
  else if (e === 'Notification') {
    const nid = `n:${state.events.length}`;
    const n = getNode(nid);
    n.type = 'notification'; n.label = 'Notification'; n.sub = (evt.message || '').slice(0, 50);
    n.color = COLORS.notification; n.data = evt; n.status = 'done';
    const parent = getNode(`s:${sid}`);
    parent.type = 'session'; parent.label = parent.label || 'Session'; parent.color = COLORS.session;
    if (!n.parentId) { n.parentId = parent.id; parent.children.push(n); }
    addTimelineEntry(evt, nid, 'notification', 'Notification', n.sub);
  }
  else if (e === 'Stop' || e === 'SessionEnd') {
    const n = state.nodes.get(`s:${sid}`);
    if (n) { n.status = 'done'; n.data = evt; n.endTime = ts; n.duration = calcDuration(n.startTime, ts); n.color = COLORS.complete; }
  }
}

function calcDuration(start, end) {
  if (!start || !end) return null;
  const ms = new Date(end) - new Date(start);
  if (ms < 1000) return `${ms}ms`;
  if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
  return `${(ms / 60000).toFixed(1)}m`;
}

function formatToolSub(evt) {
  if (!evt.tool_input) return '';
  const ti = evt.tool_input;
  if (evt.tool_name === 'Bash') return (ti.command || '').slice(0, 45);
  if (evt.tool_name === 'Read') return (ti.file_path || '').split(/[/\\]/).pop();
  if (evt.tool_name === 'Write') return (ti.file_path || '').split(/[/\\]/).pop();
  if (evt.tool_name === 'Edit') return (ti.file_path || '').split(/[/\\]/).pop();
  if (evt.tool_name === 'Grep') return (ti.pattern || '').slice(0, 45);
  if (evt.tool_name === 'Glob') return (ti.pattern || '').slice(0, 45);
  if (evt.tool_name === 'Agent') return (ti.description || '').slice(0, 45);
  if (evt.tool_name === 'Skill') return (ti.skill || '').slice(0, 45);
  return '';
}

// ═══════════════════════════════════════════════
// LAYOUT — Orbital layout
// ═══════════════════════════════════════════════
function layout() {
  const roots = [];
  for (const n of state.nodes.values()) {
    if (!n.parentId) roots.push(n);
  }

  // Place sessions side by side
  const totalRoots = roots.length;
  roots.forEach((root, i) => {
    const cx = totalRoots > 1 ? (i - (totalRoots - 1) / 2) * 400 : 0;
    root.x = cx; root.y = 0;

    // Separate agents from tools
    const agents = root.children.filter(c => c.type === 'agent');
    const tools = root.children.filter(c => c.type !== 'agent');

    // Place agents in a ring around session
    const agentDist = SPAWN_DIST + Math.max(0, agents.length - 3) * 30;
    agents.forEach((agent, ai) => {
      const angle = -Math.PI / 2 + (ai / Math.max(agents.length, 1)) * Math.PI * 2;
      agent.x = cx + Math.cos(angle) * agentDist;
      agent.y = root.y + Math.sin(angle) * agentDist;

      // Place agent's tools — only show running + last 5 completed
      const aTools = agent.children.filter(c => matchesFilter(c));
      const runningTools = aTools.filter(c => c.status === 'running');
      const doneTools = aTools.filter(c => c.status !== 'running');
      const visibleDone = doneTools.slice(-5);
      const visibleTools = [...visibleDone, ...runningTools];

      // Fan tools outward from the agent, away from session center
      const baseAngle = Math.atan2(agent.y - root.y, agent.x - root.x);
      const toolDist = 90 + visibleTools.length * 8;
      const spread = Math.min(Math.PI * 1.2, visibleTools.length * 0.35);

      visibleTools.forEach((tool, ti) => {
        const tAngle = baseAngle - spread / 2 + (ti / Math.max(visibleTools.length - 1, 1)) * spread;
        tool.x = agent.x + Math.cos(tAngle) * toolDist;
        tool.y = agent.y + Math.sin(tAngle) * toolDist;
        tool._visible = true;
      });
      aTools.filter(c => !visibleTools.includes(c)).forEach(c => { c._visible = false; });
    });

    // Root-level tools — compact ring around session
    const visibleRootTools = tools.filter(c => matchesFilter(c));
    const runningRootTools = visibleRootTools.filter(c => c.status === 'running');
    const doneRootTools = visibleRootTools.filter(c => c.status !== 'running');
    const recentRootTools = [...doneRootTools.slice(-10), ...runningRootTools];
    const rootToolDist = agents.length > 0 ? SPAWN_DIST * 0.55 : SPAWN_DIST * 0.7;
    recentRootTools.forEach((tool, ti) => {
      const angle = -Math.PI / 2 + (ti / Math.max(recentRootTools.length, 1)) * Math.PI * 2;
      tool.x = cx + Math.cos(angle) * rootToolDist;
      tool.y = root.y + Math.sin(angle) * rootToolDist;
      tool._visible = true;
    });
    visibleRootTools.filter(c => !recentRootTools.includes(c)).forEach(c => { c._visible = false; });
  });

  // Update visual node targets
  for (const n of state.nodes.values()) {
    const vn = ensureVisNode(n.id);
    vn.targetX = n.x;
    vn.targetY = n.y;
    const isDoneTool = (n.type === 'tool' || n.type === 'skill') && n.status !== 'running';
    vn.targetOpacity = (n._visible === false) ? 0 : isDoneTool ? 0.5 : 1;
    vn.targetScale = (n._visible === false) ? 0 : 1;
  }
}

function matchesFilter(n) {
  if (!state.filter) return true;
  const f = state.filter;
  return n.label.toLowerCase().includes(f) || n.sub.toLowerCase().includes(f) || n.type.includes(f);
}

// ═══════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════
let lastFrame = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastFrame) / 1000, 0.05);
  lastFrame = now;
  vis.time = now / 1000;

  // Lerp camera
  const cam = vis.camera;
  cam.x += (cam.targetX - cam.x) * Math.min(1, dt * 8);
  cam.y += (cam.targetY - cam.y) * Math.min(1, dt * 8);
  cam.zoom += (cam.targetZoom - cam.zoom) * Math.min(1, dt * 8);

  // Lerp visual nodes
  for (const [id, vn] of vis.nodes) {
    const lerpAmt = Math.min(1, dt * LERP_SPEED);
    vn.x += (vn.targetX - vn.x) * lerpAmt;
    vn.y += (vn.targetY - vn.y) * lerpAmt;
    vn.opacity += (vn.targetOpacity - vn.opacity) * lerpAmt;
    vn.scale += (vn.targetScale - vn.scale) * lerpAmt;
  }

  // Update particles
  updateParticles(dt);

  draw();
}

function draw() {
  const cam = vis.camera;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = COLORS.void;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  drawGrid();

  // Apply camera transform
  ctx.save();
  ctx.translate(cam.x * cam.zoom, cam.y * cam.zoom);
  ctx.scale(cam.zoom, cam.zoom);

  // Draw edges
  for (const n of state.nodes.values()) {
    if (!n.parentId) continue;
    const vn = vis.nodes.get(n.id);
    const pvn = vis.nodes.get(n.parentId);
    if (!vn || !pvn || vn.opacity < 0.05) continue;
    drawEdge(pvn, vn, n.status === 'running');
  }

  // Draw particles
  for (const p of vis.particles) {
    if (p.opacity <= 0) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(p.color, p.opacity * 0.8);
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(p.color, p.opacity * 0.15);
    ctx.fill();
  }

  // Draw nodes (sorted: sessions first, then agents, then tools on top)
  const drawOrder = [];
  for (const n of state.nodes.values()) {
    const vn = vis.nodes.get(n.id);
    if (!vn || vn.opacity < 0.05) continue;
    const order = n.type === 'session' ? 0 : n.type === 'agent' ? 1 : 2;
    drawOrder.push({ n, vn, order });
  }
  drawOrder.sort((a, b) => a.order - b.order);

  for (const { n, vn } of drawOrder) {
    if (n.type === 'session') drawSessionNode(n, vn);
    else if (n.type === 'agent') drawAgentNode(n, vn);
    else drawToolNode(n, vn);
  }

  ctx.restore();

  // Empty state
  if (state.nodes.size === 0) {
    drawEmptyState();
  }
}

function drawGrid() {
  const cam = vis.camera;
  const gridSize = 40;
  const ox = (cam.x * cam.zoom) % (gridSize * cam.zoom);
  const oy = (cam.y * cam.zoom) % (gridSize * cam.zoom);
  const step = gridSize * cam.zoom;

  ctx.fillStyle = COLORS.grid;
  for (let x = ox; x < W; x += step) {
    for (let y = oy; y < H; y += step) {
      ctx.beginPath();
      ctx.arc(x, y, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawEdge(from, to, active) {
  const alpha = Math.min(from.opacity, to.opacity);
  if (alpha < 0.05) return;

  ctx.beginPath();
  const mx = (from.x + to.x) / 2;
  const my = (from.y + to.y) / 2;
  ctx.moveTo(from.x, from.y);
  ctx.quadraticCurveTo(mx + (to.y - from.y) * 0.15, my - (to.x - from.x) * 0.15, to.x, to.y);

  if (active) {
    ctx.strokeStyle = hexAlpha(COLORS.edgeActive, alpha);
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
    // Bright glow
    ctx.strokeStyle = hexAlpha('#66ccff', alpha * 0.15);
    ctx.lineWidth = 8;
    ctx.stroke();
  } else {
    ctx.strokeStyle = hexAlpha(COLORS.edge, alpha * 0.6);
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.stroke();
  }
}

function drawSessionNode(n, vn) {
  const r = SESSION_R * vn.scale;
  const isSelected = state.selected === n.id;
  const isHovered = vis.hoveredNode === n.id;
  const pulse = n.status === 'running' ? 0.5 + 0.5 * Math.sin(vis.time * 2 + vn.glowPhase) : 0;

  ctx.save();
  ctx.globalAlpha = vn.opacity;

  // Outer glow
  if (n.status === 'running' || isSelected) {
    const gradient = ctx.createRadialGradient(vn.x, vn.y, r * 0.5, vn.x, vn.y, r * 2.5);
    gradient.addColorStop(0, hexAlpha(n.color, 0.15 + pulse * 0.1));
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(vn.x - r * 3, vn.y - r * 3, r * 6, r * 6);
  }

  // Ring
  ctx.beginPath();
  ctx.arc(vn.x, vn.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = hexAlpha(n.color, 0.4 + pulse * 0.3 + (isHovered ? 0.2 : 0));
  ctx.lineWidth = isSelected ? 3 : 2;
  ctx.stroke();

  // Fill
  ctx.fillStyle = hexAlpha(n.color, 0.08 + (isHovered ? 0.04 : 0));
  ctx.fill();

  // Inner ring
  ctx.beginPath();
  ctx.arc(vn.x, vn.y, r * 0.6, 0, Math.PI * 2);
  ctx.strokeStyle = hexAlpha(n.color, 0.15);
  ctx.lineWidth = 1;
  ctx.stroke();

  // Spinning arc for running
  if (n.status === 'running') {
    ctx.beginPath();
    const startAngle = vis.time * 1.5;
    ctx.arc(vn.x, vn.y, r + 4, startAngle, startAngle + Math.PI * 0.7);
    ctx.strokeStyle = hexAlpha(n.color, 0.6);
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = hexAlpha('#ffffff', 0.9);
  ctx.font = 'bold 13px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.label, vn.x, vn.y - 6);

  // Sub
  ctx.fillStyle = hexAlpha(n.color, 0.7);
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  ctx.fillText(n.sub, vn.x, vn.y + 9);

  // Duration
  if (n.duration) {
    ctx.fillStyle = hexAlpha('#ffffff', 0.4);
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    ctx.fillText(n.duration, vn.x, vn.y + r + 14);
  }

  ctx.restore();
}

function drawAgentNode(n, vn) {
  const r = AGENT_R * vn.scale;
  const isSelected = state.selected === n.id;
  const isHovered = vis.hoveredNode === n.id;
  const pulse = n.status === 'running' ? 0.5 + 0.5 * Math.sin(vis.time * 2.5 + vn.glowPhase) : 0;

  ctx.save();
  ctx.globalAlpha = vn.opacity;

  // Glow
  if (n.status === 'running' || isSelected) {
    const gradient = ctx.createRadialGradient(vn.x, vn.y, r * 0.3, vn.x, vn.y, r * 2);
    gradient.addColorStop(0, hexAlpha(n.color, 0.12 + pulse * 0.08));
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(vn.x - r * 2.5, vn.y - r * 2.5, r * 5, r * 5);
  }

  // Circle
  ctx.beginPath();
  ctx.arc(vn.x, vn.y, r, 0, Math.PI * 2);
  ctx.fillStyle = hexAlpha(n.color, 0.08 + (isHovered ? 0.05 : 0));
  ctx.fill();
  ctx.strokeStyle = hexAlpha(n.color, 0.5 + pulse * 0.3 + (isHovered ? 0.2 : 0));
  ctx.lineWidth = isSelected ? 2.5 : 1.5;
  ctx.stroke();

  // Spinning arc
  if (n.status === 'running') {
    ctx.beginPath();
    const a = vis.time * 2;
    ctx.arc(vn.x, vn.y, r + 3, a, a + Math.PI * 0.5);
    ctx.strokeStyle = hexAlpha(n.color, 0.5);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = hexAlpha('#ffffff', 0.9);
  ctx.font = 'bold 11px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(truncate(n.label, 14), vn.x, vn.y - 5);

  ctx.fillStyle = hexAlpha(n.color, 0.6);
  ctx.font = '9px -apple-system, system-ui, sans-serif';
  ctx.fillText(truncate(n.sub, 18), vn.x, vn.y + 8);

  // Tool count badge
  const toolCount = n.children.length;
  if (toolCount > 0) {
    const runCount = n.children.filter(c => c.status === 'running').length;
    const badgeText = runCount > 0 ? `${runCount}/${toolCount}` : String(toolCount);
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    const tw = ctx.measureText(badgeText).width + 8;
    const bx = vn.x + r * 0.7, by = vn.y - r * 0.7;
    ctx.fillStyle = hexAlpha(n.color, 0.3);
    roundRect(ctx, bx - tw / 2, by - 7, tw, 14, 7);
    ctx.fill();
    ctx.fillStyle = hexAlpha('#ffffff', 0.8);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(badgeText, bx, by);
  }

  // Duration
  if (n.duration) {
    ctx.fillStyle = hexAlpha('#ffffff', 0.35);
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(n.duration, vn.x, vn.y + r + 12);
  }

  ctx.restore();
}

function drawToolNode(n, vn) {
  const w = TOOL_W * vn.scale;
  const h = TOOL_H * vn.scale;
  const isSelected = state.selected === n.id;
  const isHovered = vis.hoveredNode === n.id;
  const isRunning = n.status === 'running';
  const isError = n.status === 'error';

  ctx.save();
  ctx.globalAlpha = vn.opacity;

  const color = isError ? COLORS.error : n.color;

  // Glow for running
  if (isRunning) {
    const gradient = ctx.createRadialGradient(vn.x, vn.y, 0, vn.x, vn.y, w * 0.8);
    gradient.addColorStop(0, hexAlpha(color, 0.06));
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(vn.x - w, vn.y - w, w * 2, w * 2);
  }

  // Card background
  ctx.fillStyle = hexAlpha(color, isHovered ? 0.12 : 0.06);
  roundRect(ctx, vn.x - w / 2, vn.y - h / 2, w, h, 8 * vn.scale);
  ctx.fill();

  // Border
  ctx.strokeStyle = hexAlpha(color, isSelected ? 0.6 : isHovered ? 0.4 : 0.2);
  ctx.lineWidth = isSelected ? 2 : 1;
  roundRect(ctx, vn.x - w / 2, vn.y - h / 2, w, h, 8 * vn.scale);
  ctx.stroke();

  // Status dot
  const dotR = 3 * vn.scale;
  const dotX = vn.x - w / 2 + 10 * vn.scale;
  const dotColor = isError ? COLORS.error : isRunning ? COLORS.notification : COLORS.complete;
  ctx.beginPath();
  ctx.arc(dotX, vn.y, dotR, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
  if (isRunning) {
    ctx.beginPath();
    ctx.arc(dotX, vn.y, dotR * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(dotColor, 0.15 + 0.1 * Math.sin(vis.time * 3));
    ctx.fill();
  }

  // Label
  ctx.fillStyle = hexAlpha('#ffffff', 0.85);
  ctx.font = `bold ${10 * vn.scale}px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(truncate(n.label, 12), vn.x - w / 2 + 20 * vn.scale, vn.y - (n.sub ? 4 : 0) * vn.scale);

  // Sub
  if (n.sub) {
    ctx.fillStyle = hexAlpha(color, 0.5);
    ctx.font = `${8 * vn.scale}px -apple-system, system-ui, sans-serif`;
    ctx.fillText(truncate(n.sub, 20), vn.x - w / 2 + 20 * vn.scale, vn.y + 7 * vn.scale);
  }

  // Duration
  if (n.duration) {
    ctx.fillStyle = hexAlpha('#ffffff', 0.35);
    ctx.font = `${8 * vn.scale}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(n.duration, vn.x + w / 2 - 8 * vn.scale, vn.y);
  }

  ctx.restore();
}

function drawEmptyState() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Pulsing logo
  const pulse = 0.3 + 0.1 * Math.sin(vis.time * 1.5);
  ctx.fillStyle = hexAlpha('#66ccff', pulse);
  ctx.font = 'bold 48px -apple-system, system-ui, sans-serif';
  ctx.fillText('◈', W / 2 - 180, H / 2);

  // Rings
  for (let i = 0; i < 3; i++) {
    const r = 60 + i * 25;
    const alpha = 0.08 - i * 0.02 + 0.03 * Math.sin(vis.time * 1.2 + i);
    ctx.beginPath();
    ctx.arc(W / 2 - 180, H / 2, r, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha('#66ccff', alpha);
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  ctx.fillStyle = hexAlpha('#66ccff', 0.5);
  ctx.font = '14px -apple-system, system-ui, sans-serif';
  ctx.fillText('Waiting for Claude Code events...', W / 2 - 180, H / 2 + 90);

  ctx.fillStyle = hexAlpha('#66ccff', 0.25);
  ctx.font = '12px -apple-system, system-ui, sans-serif';
  ctx.fillText('Events will appear here in real-time', W / 2 - 180, H / 2 + 112);

  ctx.restore();
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function updateParticles(dt) {
  // Spawn
  for (const n of state.nodes.values()) {
    if (n.status !== 'running' || !n.parentId) continue;
    const pvn = vis.nodes.get(n.parentId);
    const vn = vis.nodes.get(n.id);
    if (!pvn || !vn || vn.opacity < 0.1) continue;

    if (Math.random() < dt * 3) {
      vis.particles.push({
        sx: pvn.x, sy: pvn.y,
        tx: vn.x, ty: vn.y,
        progress: 0, speed: 0.3 + Math.random() * 0.5,
        size: 1.2 + Math.random() * 1.5,
        color: n.color || COLORS.particle,
        opacity: 1,
      });
    }
  }

  // Animate
  for (let i = vis.particles.length - 1; i >= 0; i--) {
    const p = vis.particles[i];
    p.progress += dt * p.speed;
    if (p.progress >= 1) { vis.particles.splice(i, 1); continue; }
    const t = easeInOut(p.progress);
    p.x = p.sx + (p.tx - p.sx) * t;
    p.y = p.sy + (p.ty - p.sy) * t;
    p.opacity = p.progress < 0.15 ? p.progress / 0.15 : p.progress > 0.75 ? (1 - p.progress) / 0.25 : 1;
  }

  // Cap particles
  if (vis.particles.length > 200) vis.particles.splice(0, vis.particles.length - 200);
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function lerp(a, b, t) { return a + (b - a) * t; }

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function hexAlpha(hex, alpha) {
  if (hex.startsWith('rgba')) return hex; // passthrough
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, alpha))})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function truncate(s, max) { return s.length > max ? s.slice(0, max - 1) + '…' : s; }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ═══════════════════════════════════════════════
// FEED (Activity panel)
// ═══════════════════════════════════════════════
function renderFeed() {
  const list = document.getElementById('feed-list');
  const entries = state.timelineEntries.slice(-100);
  document.getElementById('feed-count').textContent = `${state.timelineEntries.length} events`;

  // Only render last 60 for perf
  const visible = entries.slice(-60);
  list.innerHTML = visible.map(e => {
    const n = state.nodes.get(e.nodeId);
    const dur = n && n.duration ? n.duration : '';
    const isRunning = n && n.status === 'running';
    const color = getTypeColor(e.type);
    const isActive = state.selected === e.nodeId;

    return `<div class="feed-item${isActive ? ' active' : ''}${isRunning ? ' running' : ''}" data-node="${e.nodeId}">
      <div class="feed-dot" style="background:${color};box-shadow:0 0 6px ${hexAlpha(color, 0.4)}"></div>
      <div class="feed-info">
        <div class="feed-label" style="color:${hexAlpha(color, 0.9)}">${esc(e.label)}</div>
        ${e.sub ? `<div class="feed-sub">${esc(e.sub)}</div>` : ''}
      </div>
      <div class="feed-dur">${dur}</div>
    </div>`;
  }).join('');

  list.scrollTop = list.scrollHeight;
}

function getTypeColor(type) {
  const map = { session: COLORS.session, agent: COLORS.agent, tool: COLORS.tool, skill: COLORS.skill, notification: COLORS.notification, error: COLORS.error };
  return map[type] || COLORS.tool;
}

// Feed click
document.getElementById('feed-list').addEventListener('click', e => {
  const item = e.target.closest('.feed-item');
  if (!item) return;
  const nodeId = item.dataset.node;
  state.selected = nodeId;
  const n = state.nodes.get(nodeId);
  if (n) {
    showDetail(n);
    // Fly camera to node
    const vn = vis.nodes.get(nodeId);
    if (vn) {
      vis.camera.targetX = -vn.targetX + (W - 380) / 2 / vis.camera.targetZoom;
      vis.camera.targetY = -vn.targetY + H / 2 / vis.camera.targetZoom;
    }
  }
  renderFeed();
});

// ═══════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════
function showDetail(n) {
  const popup = document.getElementById('detail-popup');
  popup.classList.add('visible');

  const color = n.color;
  document.getElementById('detail-type').textContent = n.type.toUpperCase();
  document.getElementById('detail-type').style.color = color;
  document.getElementById('detail-name').textContent = n.label;

  const statusColor = n.status === 'error' ? COLORS.error : n.status === 'running' ? COLORS.notification : COLORS.complete;
  document.getElementById('detail-meta-grid').innerHTML = `
    <div class="meta-card">
      <div class="meta-label">Status</div>
      <div class="meta-value" style="color:${statusColor}">${n.status}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Duration</div>
      <div class="meta-value">${n.duration || '—'}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Children</div>
      <div class="meta-value">${n.children.length}</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Type</div>
      <div class="meta-value">${n.type}</div>
    </div>
  `;

  document.getElementById('detail-json').textContent = n.data ? JSON.stringify(n.data, null, 2) : '';
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-popup').classList.remove('visible');
  state.selected = null;
  renderFeed();
});

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function updateStats() {
  let running = 0, agents = 0, errors = 0;
  for (const n of state.nodes.values()) {
    if (n.type === 'agent') agents++;
    if (n.status === 'error') errors++;
    if (n.status === 'running') running++;
  }
  document.getElementById('stat-tools').textContent = state.toolsCompleted;
  document.getElementById('stat-agents').textContent = agents;

  const runEl = document.getElementById('stat-running');
  runEl.textContent = running;
  runEl.classList.toggle('has-running', running > 0);

  const errEl = document.getElementById('stat-errors');
  errEl.textContent = errors;
  errEl.classList.toggle('has-errors', errors > 0);
}

// ═══════════════════════════════════════════════
// FIT VIEW
// ═══════════════════════════════════════════════
function fitView() {
  if (!state.nodes.size) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const vn of vis.nodes.values()) {
    if (vn.targetOpacity < 0.1) continue;
    minX = Math.min(minX, vn.targetX - 60);
    maxX = Math.max(maxX, vn.targetX + 60);
    minY = Math.min(minY, vn.targetY - 60);
    maxY = Math.max(maxY, vn.targetY + 60);
  }
  if (!isFinite(minX)) return;

  const availW = W - 380; // Account for feed panel
  const pad = 80;
  const w = maxX - minX + pad * 2;
  const h = maxY - minY + pad * 2;
  const zoom = Math.min(availW / w, H / h, 2);
  vis.camera.targetZoom = zoom;
  vis.camera.targetX = -(minX + maxX) / 2 + availW / 2 / zoom;
  vis.camera.targetY = -(minY + maxY) / 2 + H / 2 / zoom;
}

// ═══════════════════════════════════════════════
// SESSIONS
// ═══════════════════════════════════════════════
let currentSessionId = null;
const sessionTitles = new Map();

function toggleSessions() {
  document.getElementById('sessions-overlay').classList.toggle('visible');
}

async function loadSessions() {
  try {
    const res = await fetch('/sessions');
    const sessions = await res.json();

    // Cache titles and update session node labels
    for (const s of sessions) {
      if (s.title) sessionTitles.set(s.id, s.title);
      const node = state.nodes.get(`s:${s.id}`);
      if (node && s.title) {
        node.label = truncate(s.title, 20);
        node.sub = '';
      }
    }

    document.getElementById('sessions-list').innerHTML =
      `<div class="session-card${!currentSessionId ? ' active' : ''}" data-sid="">
        <div class="s-title">▶ Latest (auto)</div>
        <div class="s-meta"><span>Follows most recent session</span></div>
      </div>` +
      sessions.map(s => `
        <div class="session-card${currentSessionId === s.id ? ' active' : ''}" data-sid="${s.id}">
          <div class="s-title">${esc(s.title)}</div>
          ${s.prompt ? `<div class="s-prompt">${esc(s.prompt)}</div>` : ''}
          <div class="s-meta">
            <span>${s.eventCount || 0} events</span>
            <span>${formatAge(s.mtime)}</span>
          </div>
        </div>
      `).join('');
  } catch {}
}

function formatAge(mtime) {
  const ago = Date.now() - mtime;
  if (ago < 60000) return 'just now';
  if (ago < 3600000) return `${Math.floor(ago / 60000)}m ago`;
  if (ago < 86400000) return `${Math.floor(ago / 3600000)}h ago`;
  return `${Math.floor(ago / 86400000)}d ago`;
}

document.getElementById('sessions-list').addEventListener('click', e => {
  const card = e.target.closest('.session-card');
  if (!card) return;
  currentSessionId = card.dataset.sid || null;
  clearState();
  firstBatch = true;
  poll();
  loadSessions();
  document.getElementById('sessions-overlay').classList.remove('visible');
});

function clearState() {
  state.events = []; state.offset = 0; state.nodes.clear();
  state.selected = null; state.toolsCompleted = 0;
  state.timelineEntries = []; state.startTimes.clear();
  state._lastServerId = null;
  vis.nodes.clear(); vis.particles = [];
  renderFeed(); updateStats();
}

async function resetEvents() {
  clearing = true;
  if (currentSessionId) await fetch(`/events?clear=${currentSessionId}`);
  else await fetch('/events?clear=1');
  clearState();
  await loadSessions();
  clearing = false;
}

function toggleAutoFit() {
  state.autoFit = !state.autoFit;
  document.getElementById('autofit-label').textContent = state.autoFit ? 'ON' : 'OFF';
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
const searchBox = document.getElementById('search-box');

document.addEventListener('keydown', e => {
  if (e.target === searchBox) {
    if (e.key === 'Escape') { searchBox.blur(); searchBox.value = ''; state.filter = ''; layout(); }
    return;
  }
  if (e.key === 'f' || e.key === 'F') fitView();
  if (e.key === 'c' || e.key === 'C') resetEvents();
  if (e.key === 's' || e.key === 'S') toggleSessions();
  if (e.key === '/') { e.preventDefault(); searchBox.focus(); }
  if (e.key === 'Escape') {
    state.selected = null;
    document.getElementById('detail-popup').classList.remove('visible');
    document.getElementById('sessions-overlay').classList.remove('visible');
    renderFeed();
  }
});

searchBox.addEventListener('input', () => {
  state.filter = searchBox.value.toLowerCase();
  layout();
});

// ═══════════════════════════════════════════════
// SSE + POLLING
// ═══════════════════════════════════════════════
let sseSource = null;
const connDot = document.getElementById('connection-dot');

function connectSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/stream');
  sseSource.onopen = () => { connDot.classList.add('connected'); connDot.title = 'Connected'; };
  sseSource.onerror = () => { connDot.classList.remove('connected'); connDot.title = 'Disconnected'; };
  sseSource.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === 'event') {
        const target = currentSessionId || state._lastServerId;
        if (!target || data.session === target) {
          if (!currentSessionId && !state._lastServerId) state._lastServerId = data.session;
          state.events.push(data.event);
          processEvent(data.event);
          layout();
          renderFeed();
          updateStats();
          if (state.autoFit && state.nodes.size) setTimeout(fitView, 100);
        }
      }
    } catch {}
  };
}

let firstBatch = true, clearing = false;

async function poll() {
  if (clearing) return;
  try {
    const sp = currentSessionId ? `&session=${currentSessionId}` : '';
    const res = await fetch(`/events?offset=${state.offset}${sp}`);
    const size = parseInt(res.headers.get('X-File-Size') || '0', 10);
    const serverId = res.headers.get('X-Session-Id') || '';
    const text = await res.text();
    if (!text.trim()) return;
    if (!currentSessionId && state._lastServerId && state._lastServerId !== serverId) {
      clearState(); firstBatch = true;
    }
    state._lastServerId = serverId;
    state.offset = size;
    const lines = text.trim().split('\n');
    for (const line of lines) {
      try { const evt = JSON.parse(line); state.events.push(evt); processEvent(evt); } catch {}
    }
    layout(); renderFeed(); updateStats();
    if (firstBatch && state.nodes.size) { firstBatch = false; setTimeout(fitView, 100); }
  } catch {}
}

// Live durations
function updateLiveDurations() {
  const now = new Date();
  for (const n of state.nodes.values()) {
    if (n.status === 'running' && n.startTime) {
      const ms = now - new Date(n.startTime);
      n.duration = ms < 1000 ? `${ms}ms` : ms < 60000 ? `${(ms / 1000).toFixed(1)}s` : `${(ms / 60000).toFixed(1)}m`;
    }
  }
  renderFeed();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadSessions();
connectSSE();
poll();
setInterval(loadSessions, 5000);
setInterval(poll, 2000);
setInterval(updateLiveDurations, 1000);
requestAnimationFrame(animate);
</script>
</body>
