<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agent-viz</title>
<link rel="stylesheet" href="./public/viz.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">&#x25C8;</div>
      agent-viz
      <span id="topbar-agent" class="agent-badge"></span>
    </div>
    <span class="sep"></span>
    <div id="connection-dot" title="Disconnected"></div>
    <span id="topbar-prompt" style="font-size:12px;color:var(--text-dim);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title=""></span>
    <span class="sep"></span>
    <div class="stat-group">
      <div class="stat"><span class="stat-dot" style="background:var(--tool)"></span><span id="stat-tools" class="stat-val">0</span> tools</div>
      <div class="stat"><span class="stat-dot" style="background:var(--agent)"></span><span id="stat-agents" class="stat-val">0</span> agents</div>
      <div class="stat"><span class="stat-dot" style="background:var(--notification)"></span><span id="stat-running" class="stat-val">0</span> active</div>
      <div class="stat"><span class="stat-dot" style="background:var(--error)"></span><span id="stat-errors" class="stat-val">0</span> errors</div>
    </div>
    <div class="topbar-right">
      <input id="search-box" type="text" placeholder="Filter... (/)">
    </div>
  </div>

  <div id="main">
    <canvas id="canvas"></canvas>

    <!-- Activity Feed -->
    <div id="feed" class="glass-panel">
      <div id="feed-header">
        <span id="feed-title">Activity</span>
        <span id="feed-count"></span>
      </div>
      <div id="feed-list"></div>
    </div>

    <!-- Detail popup -->
    <div id="detail-popup" class="glass-panel">
      <button id="detail-close">&times;</button>
      <div id="detail-head">
        <div id="detail-type"></div>
        <div id="detail-name"></div>
      </div>
      <div id="detail-meta-grid"></div>
      <div id="detail-json-wrap">
        <pre id="detail-json"></pre>
      </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button id="btn-sessions">Sessions <span class="shortcut">S</span></button>
      <button id="btn-fit">Fit <span class="shortcut">F</span></button>
      <button id="btn-clear">Clear <span class="shortcut">C</span></button>
      <button id="btn-autofit">Auto-fit: <span id="autofit-label">ON</span></button>
    </div>

    <!-- Sessions overlay -->
    <div id="sessions-overlay" class="glass-panel">
      <div id="sessions-title">Sessions</div>
      <div id="sessions-list"></div>
    </div>
  </div>
</div>
<div id="node-tooltip"></div>

<!-- Modularized JS — see ./public/viz-*.js -->
<script type="module">
  // Order: state → canvas (registers tick) → layout → ui → network.
  // viz-ui and viz-network have a benign import cycle; ES modules handle it
  // because all cross-calls happen inside event handlers.
  import './public/viz-state.js';
  import './public/viz-canvas.js';
  import './public/viz-layout.js';
  import './public/viz-ui.js';
  import { loadSessions, connectSSE, poll } from './public/viz-network.js';
  import { garbageCollect } from './public/viz-layout.js';
  import { requestRender } from './public/viz-state.js';

  loadSessions();
  connectSSE();
  poll();
  setInterval(garbageCollect, 60000);
  requestRender();
</script>
</body>
</html>
